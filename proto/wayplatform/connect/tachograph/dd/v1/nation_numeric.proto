  EUROPEAN_COMMUNITY = 57 [(protocol_enum_value) = 253, (nation_alpha_code) = "EC"];
  // REST_OF_WORLD is a special value
  REST_OF_WORLD = 58 [(protocol_enum_value) = 254, (nation_alpha_code) = "WLD"];
}
