  CROATIA = 28 [(protocol_enum_value) = 25, (nation_alpha_code) = "HR"];
  ITALY = 29 [(protocol_enum_value) = 26, (nation_alpha_code) = "I"];
  IRELAND = 30 [(protocol_enum_value) = 27, (nation_alpha_code) = "IRL"];
  ICELAND = 31 [(protocol_enum_value) = 28, (nation_alpha_code) = "IS"];
  KAZAKHSTAN = 32 [(protocol_enum_value) = 29, (nation_alpha_code) = "KZ"];
  LUXEMBOURG = 33 [(protocol_enum_value) = 30, (nation_alpha_code) = "L"];
  LITHUANIA = 34 [(protocol_enum_value) = 31, (nation_alpha_code) = "LT"];
  LATVIA = 35 [(protocol_enum_value) = 32, (nation_alpha_code) = "LV"];
  MALTA = 36 [(protocol_enum_value) = 33, (nation_alpha_code) = "M"];
  MONACO = 37 [(protocol_enum_value) = 34, (nation_alpha_code) = "MC"];
