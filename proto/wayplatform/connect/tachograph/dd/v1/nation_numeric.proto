  ROMANIA = 44 [(protocol_enum_value) = 41, (nation_alpha_code) = "RO"];
  SAN_MARINO = 45 [(protocol_enum_value) = 42, (nation_alpha_code) = "RSM"];
  RUSSIA = 46 [(protocol_enum_value) = 43, (nation_alpha_code) = "RUS"];
  SWEDEN = 47 [(protocol_enum_value) = 44, (nation_alpha_code) = "S"];
  SLOVAKIA = 48 [(protocol_enum_value) = 45, (nation_alpha_code) = "SK"];
