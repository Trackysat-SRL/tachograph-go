edition = "2023";

package wayplatform.connect.tachograph.dd.v1;

import "wayplatform/connect/tachograph/dd/v1/annotations.proto";

// NationNumeric defines the numeric code for a country as specified in the
// tachograph regulations (DD 2.101).
//
// The full list of numeric codes is maintained externally by the laboratory
// appointed to carry out interoperability testing (see Annex 1C, req. 440).
//
// Nation Alpha codes (UN Vienna Convention distinguishing signs) are annotated
// via the nation_alpha_code extension. Source:
// https://dtc.jrc.ec.europa.eu/dtc_nation_codes.php.html
enum NationNumeric {
  NATION_NUMERIC_UNSPECIFIED = 0;
  NATION_NUMERIC_UNRECOGNIZED = 1;
  NATION_NUMERIC_DEFAULT = 2 [(protocol_enum_value) = 0]; // Reserved
  NATION_NUMERIC_EMPTY = 3 [(protocol_enum_value) = 255]; // No information available

  AUSTRIA = 4 [(protocol_enum_value) = 1, (nation_alpha_code) = "A"];
  ALBANIA = 5 [(protocol_enum_value) = 2, (nation_alpha_code) = "AL"];
  ANDORRA = 6 [(protocol_enum_value) = 3, (nation_alpha_code) = "AND"];
  ARMENIA = 7 [(protocol_enum_value) = 4, (nation_alpha_code) = "ARM"];
  AZERBAIJAN = 8 [(protocol_enum_value) = 5, (nation_alpha_code) = "AZ"];
  BELGIUM = 9 [(protocol_enum_value) = 6, (nation_alpha_code) = "B"];
  BULGARIA = 10 [(protocol_enum_value) = 7, (nation_alpha_code) = "BG"];
  BOSNIA_HERZEGOVINA = 11 [(protocol_enum_value) = 8, (nation_alpha_code) = "BIH"];
  BELARUS = 12 [(protocol_enum_value) = 9, (nation_alpha_code) = "BY"];
  SWITZERLAND = 13 [(protocol_enum_value) = 10, (nation_alpha_code) = "CH"];
  CYPRUS = 14 [(protocol_enum_value) = 11, (nation_alpha_code) = "CY"];
  CZECH_REPUBLIC = 15 [(protocol_enum_value) = 12, (nation_alpha_code) = "CZ"];
  GERMANY = 16 [(protocol_enum_value) = 13, (nation_alpha_code) = "D"];
  DENMARK = 17 [(protocol_enum_value) = 14, (nation_alpha_code) = "DK"];
  SPAIN = 18 [(protocol_enum_value) = 15, (nation_alpha_code) = "E"];
  ESTONIA = 19 [(protocol_enum_value) = 16, (nation_alpha_code) = "EST"];
  FRANCE = 20 [(protocol_enum_value) = 17, (nation_alpha_code) = "F"];
  FINLAND = 21 [(protocol_enum_value) = 18, (nation_alpha_code) = "FIN"];
  LIECHTENSTEIN = 22 [(protocol_enum_value) = 19, (nation_alpha_code) = "FL"];
  FAROE_ISLANDS = 23 [(protocol_enum_value) = 20, (nation_alpha_code) = "FO"];
  UNITED_KINGDOM = 24 [(protocol_enum_value) = 21, (nation_alpha_code) = "UK"];
  GEORGIA = 25 [(protocol_enum_value) = 22, (nation_alpha_code) = "GE"];
